<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORK LESS, EARN MORE - Performance Marketing Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-6 md:p-12 max-w-4xl mx-auto text-slate-800">

    <header class="mb-10 text-center md:text-left">
        <h1 class="text-3xl md:text-4xl font-black italic text-slate-800 tracking-tight">WORK LESS, EARN MORE</h1>
        <p class="text-xs md:text-sm font-bold text-indigo-600 tracking-wider uppercase mt-1">Performance Marketing Workspace</p>
    </header>

    <main class="space-y-6">
        
        <section class="bg-white p-6 rounded-2xl shadow-xs border border-slate-100">
            <h2 class="text-base font-bold text-slate-800 flex items-center gap-2 mb-4">
                <i data-lucide="search" class="w-5 h-5 text-indigo-500"></i> 실시간 트렌드 체크
            </h2>
            <div class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="trendKeyword" placeholder="분석할 키워드 입력" class="flex-1 px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500 transition-colors">
                <div class="flex flex-wrap gap-2 items-center">
                    <button onclick="searchTrend('blackkiwi')" class="px-3 py-2 bg-amber-50 text-amber-700 border border-amber-200 rounded-lg text-xs font-semibold flex items-center gap-1 cursor-pointer hover:bg-amber-100">🥝 블랙키위</button>
                    <button onclick="searchTrend('naver')" class="px-3 py-2 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-lg text-xs font-semibold flex items-center gap-1 cursor-pointer hover:bg-emerald-100">💚 네이버</button>
                    <button onclick="searchTrend('youtube')" class="px-3 py-2 bg-rose-50 text-rose-700 border border-rose-200 rounded-lg text-xs font-semibold flex items-center gap-1 cursor-pointer hover:bg-rose-100">🔴 유튜브</button>
                    <button onclick="searchTrend('insta')" class="px-3 py-2 bg-pink-50 text-pink-700 border border-pink-200 rounded-lg text-xs font-semibold flex items-center gap-1 cursor-pointer hover:bg-pink-100">📸 인스타</button>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <section class="bg-white p-6 rounded-2xl shadow-xs border border-slate-100 flex flex-col justify-between">
                <div>
                    <h2 class="text-base font-bold text-slate-800 flex items-center gap-2 mb-4 italic">
                        <i data-lucide="calculator" class="w-5 h-5 text-red-500"></i> ROAS 계산기
                    </h2>
                    <div class="grid grid-cols-2 gap-3 text-xs text-slate-500 mb-2">
                        <div>광고비 (원)</div>
                        <div>매출액 (원)</div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <input type="number" id="roasCost" oninput="calculateROAS()" placeholder="0" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-red-400">
                        <input type="number" id="roasSales" oninput="calculateROAS()" placeholder="0" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-red-400">
                    </div>
                </div>
                <div class="text-right mt-2">
                    <span id="roasResult" class="text-4xl font-black text-slate-300 italic">0%</span>
                </div>
            </section>

            <section class="bg-white p-6 rounded-2xl shadow-xs border border-slate-100 flex flex-col justify-between">
                <div>
                    <h2 class="text-base font-bold text-slate-800 flex items-center gap-2 mb-4 italic">
                        <i data-lucide="target" class="w-5 h-5 text-emerald-500"></i> 목표 매출 계산기
                    </h2>
                    <div class="grid grid-cols-2 gap-3 text-xs text-slate-500 mb-2">
                        <div>광고비 (원)</div>
                        <div>목표 ROAS (%)</div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <input type="number" id="targetCost" oninput="calculateTargetSales()" placeholder="0" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-emerald-400">
                        <input type="number" id="targetRoas" oninput="calculateTargetSales()" placeholder="0" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-emerald-400">
                    </div>
                </div>
                <div class="text-right mt-2">
                    <span id="targetResult" class="text-3xl font-black text-slate-300">0원</span>
                </div>
            </section>
        </div>

        <section class="bg-white p-6 rounded-2xl shadow-xs border border-slate-100">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4">
                <div>
                    <h2 class="text-base font-bold text-slate-800 flex items-center gap-2">
                        <i data-lucide="bar-chart-3" class="w-5 h-5 text-indigo-500"></i> 다차원 보고서 그래프화
                    </h2>
                    <p class="text-xs text-slate-400 mt-1">네이버 다차원 보고서 파일을 분석하여 노출/클릭 및 ROAS 성과를 더블 시각화합니다.</p>
                </div>
                <div class="flex items-center gap-3 bg-slate-50 p-1.5 rounded-xl border border-slate-200 self-start sm:self-auto">
                    <button onclick="downloadAllCharts()" class="px-3 py-1 bg-slate-800 text-white text-xs font-bold rounded-lg hover:bg-slate-700 transition-colors cursor-pointer flex items-center gap-1">
                        <i data-lucide="download" class="w-3 h-3"></i> 전체 그래프 저장
                    </button>
                </div>
            </div>

            <div id="dropZone" class="border-2 border-dashed border-slate-200 rounded-2xl p-8 text-center bg-slate-200/10 hover:bg-slate-200/30 transition-colors cursor-pointer flex flex-col items-center justify-center min-h-[200px]">
                <div id="dropZoneContent" class="flex flex-col items-center justify-center">
                    <div class="w-12 h-12 bg-white rounded-xl shadow-xs border border-slate-100 flex items-center justify-center mb-3 text-slate-700">
                        <i data-lucide="file-spreadsheet" class="w-6 h-6 text-emerald-600"></i>
                    </div>
                    <p class="text-xs font-medium text-slate-500 underline decoration-slate-400 underline-offset-4">
                        보고서 파일(CSV, XLSX) 업로드 또는 드래그앤드롭
                    </p>
                    <p class="text-[11px] text-slate-400 mt-1">캠페인별 성과 및 ROAS 실시간 파싱</p>
                </div>
                <input type="file" id="fileInput" class="hidden" accept=".csv, .xlsx, .xls">
                
                <div id="chartsWrapper" class="w-full hidden space-y-8 mt-2">
                    <div class="bg-slate-50/50 p-4 rounded-xl border border-slate-100">
                        <h3 class="text-xs font-bold text-slate-500 text-left mb-2 flex items-center gap-1">
                            <span class="w-1.5 h-3 bg-indigo-500 rounded-xs"></span> 캠페인별 기본 성과 (노출수 & 클릭수)
                        </h3>
                        <div class="max-h-[260px] relative w-full">
                            <canvas id="mktPerformanceChart"></canvas>
                        </div>
                    </div>
                    
                    <div class="bg-slate-50/50 p-4 rounded-xl border border-slate-100">
                        <h3 class="text-xs font-bold text-slate-500 text-left mb-2 flex items-center gap-1">
                            <span class="w-1.5 h-3 bg-emerald-500 rounded-xs"></span> 캠페인별 실시간 ROAS (%) 분석
                        </h3>
                        <div class="max-h-[240px] relative w-full">
                            <canvas id="mktRoasChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        lucide.createIcons();
        let performanceChart = null;
        let roasChart = null;

        // 1. 실시간 트렌드 검색
        function searchTrend(platform) {
            const keyword = document.getElementById('trendKeyword').value.trim();
            if (!keyword) {
                alert('분석할 키워드를 입력해주세요!');
                return;
            }
            
            let url = '';
            switch(platform) {
                case 'blackkiwi': url = `https://blackkiwi.net/search?keyword=${encodeURIComponent(keyword)}`; break;
                case 'naver': url = `https://search.naver.com/search.naver?query=${encodeURIComponent(keyword)}`; break;
                case 'youtube': url = `https://www.youtube.com/results?search_query=${encodeURIComponent(keyword)}`; break;
                case 'insta': url = `https://www.instagram.com/explore/tags/${encodeURIComponent(keyword)}/`; break;
            }
            if(url) window.open(url, '_blank');
        }

        // 2. ROAS 계산기
        function calculateROAS() {
            const cost = parseFloat(document.getElementById('roasCost').value) || 0;
            const sales = parseFloat(document.getElementById('roasSales').value) || 0;
            const resultSpan = document.getElementById('roasResult');

            if (cost > 0) {
                const roas = (sales / cost) * 100;
                resultSpan.innerText = `${Math.round(roas)}%`;
                resultSpan.className = "text-4xl font-black text-red-500 italic transition-all";
            } else {
                resultSpan.innerText = "0%";
                resultSpan.className = "text-4xl font-black text-slate-300 italic";
            }
        }

        // 3. 목표 매출 계산기
        function calculateTargetSales() {
            const cost = parseFloat(document.getElementById('targetCost').value) || 0;
            const targetRoas = parseFloat(document.getElementById('targetRoas').value) || 0;
            const resultSpan = document.getElementById('targetResult');

            if (cost > 0 && targetRoas > 0) {
                const targetSales = cost * (targetRoas / 100);
                resultSpan.innerText = `${Math.round(targetSales).toLocaleString()}원`;
                resultSpan.className = "text-3xl font-black text-emerald-600 transition-all";
            } else {
                resultSpan.innerText = "0원";
                resultSpan.className = "text-3xl font-black text-slate-300";
            }
        }

        // 4. 파일 드롭존 연동 및 파싱 컨트롤
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const dropZoneContent = document.getElementById('dropZoneContent');
        const chartsWrapper = document.getElementById('chartsWrapper');

        dropZone.addEventListener('click', (e) => {
            if (e.target.closest('#chartsWrapper')) return; // 차트 컨테이너 내부 클릭 시 파일창 팝업 방지
            fileInput.click();
        });

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('bg-indigo-50/50'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('bg-indigo-50/50'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-indigo-50/50');
            const files = e.dataTransfer.files;
            if(files.length > 0) handleFile(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            const fileExtension = file.name.split('.').pop().toLowerCase();
            
            if (fileExtension === 'csv') {
                Papa.parse(file, {
                    complete: function(results) { processData(results.data); },
                    error: function() { alert('CSV 파싱에 실패했습니다.'); }
                });
            } else if (fileExtension === 'xlsx' || fileExtension === 'xls') {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                    processData(jsonData);
                };
                reader.readAsArrayBuffer(file);
            } else {
                alert('지원하지 않는 파일 형식입니다. CSV 또는 Excel 파일을 업로드해 주세요.');
            }
        }

        // 네이버 다차원 데이터 처리 로직 확장 (노출, 클릭, 광고비, 매출액 기준 계산)
        function processData(rows) {
            let startRowIdx = 0;
            
            for(let i=0; i < Math.min(rows.length, 12); i++) {
                if(rows[i] && rows[i].some(cell => String(cell).includes('캠페인') || String(cell).includes('노출수'))) {
                    startRowIdx = i;
                    break;
                }
            }

            const header = rows[startRowIdx] || [];
            const campaignIdx = header.findIndex(cell => String(cell).includes('캠페인'));
            const impressionIdx = header.findIndex(cell => String(cell).includes('노출수'));
            const clickIdx = header.findIndex(cell => String(cell).includes('클릭수'));
            
            // 광고비 및 전환액(매출액) 탐색용 인덱스
            const costIdx = header.findIndex(cell => String(cell).includes('광고비'));
            const salesIdx = header.findIndex(cell => String(cell).includes('전환매출액') || String(cell).includes('총전환매출액') || String(cell).includes('매출액'));
            const directRoasIdx = header.findIndex(cell => String(cell).toUpperCase().includes('ROAS'));

            if (campaignIdx === -1 || impressionIdx === -1 || clickIdx === -1) {
                alert('필수 열(캠페인, 노출수, 클릭수)을 다차원 보고서에서 찾을 수 없습니다.');
                return;
            }

            const summary = {};
            for(let i = startRowIdx + 1; i < rows.length; i++) {
                const row = rows[i];
                if(!row || !row[campaignIdx]) continue;

                const campaignName = String(row[campaignIdx]).trim();
                if(campaignName === '합계' || campaignName === '총합' || campaignName.includes('행 데이터')) continue;

                const imps = parseInt(String(row[impressionIdx]).replace(/,/g, '')) || 0;
                const clicks = parseInt(String(row[clickIdx]).replace(/,/g, '')) || 0;
                const cost = parseFloat(String(row[costIdx] || 0).replace(/,/g, '')) || 0;
                const sales = parseFloat(String(row[salesIdx] || 0).replace(/,/g, '')) || 0;
                const rawRoas = directRoasIdx !== -1 ? parseFloat(String(row[directRoasIdx] || 0).replace(/,/g, '')) : 0;

                if(!summary[campaignName]) {
                    summary[campaignName] = { imps: 0, clicks: 0, cost: 0, sales: 0, rawRoas: 0, count: 0 };
                }
                summary[campaignName].imps += imps;
                summary[campaignName].clicks += clicks;
                summary[campaignName].cost += cost;
                summary[campaignName].sales += sales;
                if(rawRoas > 0) {
                    summary[campaignName].rawRoas += rawRoas;
                    summary[campaignName].count++;
                }
            }

            const labels = Object.keys(summary);
            const impsData = labels.map(k => summary[k].imps);
            const clicksData = labels.map(k => summary[k].clicks);
            
            // 캠페인별 정확한 최종 ROAS 산출 로직
            const roasData = labels.map(k => {
                const item = summary[k];
                if (item.cost > 0) {
                    return Math.round((item.sales / item.cost) * 100);
                } else if (item.count > 0) {
                    return Math.round(item.rawRoas / item.count); // 보고서 자체 ROAS가 있을 시 평균 계산
                }
                return 0;
            });

            if(labels.length === 0) {
                alert('가공할 수 있는 데이터 라인이 없습니다.');
                return;
            }

            // UI 보이기 스위칭
            dropZoneContent.classList.add('hidden');
            chartsWrapper.classList.remove('hidden');
            
            // 양측 차트 독립 렌더링 진행
            renderPerformanceChart(labels, impsData, clicksData);
            renderRoasChart(labels, roasData);
        }

        // 차트 1: 노출수 & 클릭수 결합 그래프
        function renderPerformanceChart(labels, imps, clicks) {
            const ctx = document.getElementById('mktPerformanceChart').getContext('2d');
            if(performanceChart) performanceChart.destroy();

            performanceChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '클릭수 (우축)',
                            data: clicks,
                            backgroundColor: '#ef4444',
                            borderColor: '#ef4444',
                            yAxisID: 'yClicks',
                            type: 'line',
                            borderWidth: 2,
                            tension: 0.2
                        },
                        {
                            label: '노출수 (좌축)',
                            data: imps,
                            backgroundColor: '#4f46e5',
                            yAxisID: 'yImps',
                            borderRadius: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        yImps: { type: 'linear', position: 'left', title: { display: true, text: '노출수', font: { size: 10 } }, grid: { color: '#f1f5f9' } },
                        yClicks: { type: 'linear', position: 'right', title: { display: true, text: '클릭수', font: { size: 10 } }, grid: { drawOnChartArea: false } }
                    },
                    plugins: { legend: { labels: { font: { size: 11, family: 'Noto Sans KR' } } } }
                }
            });
        }

        // 차트 2: ROAS 전용 라인/바 혼합 그래프
        function renderRoasChart(labels, roasValues) {
            const ctx = document.getElementById('mktRoasChart').getContext('2d');
            if(roasChart) roasChart.destroy();

            roasChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '캠페인별 ROAS (%)',
                        data: roasValues,
                        backgroundColor: 'rgba(16, 185, 129, 0.2)',
                        borderColor: '#10b981',
                        borderWidth: 2,
                        borderRadius: 4,
                        type: 'bar',
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            type: 'linear',
                            beginAtZero: true,
                            title: { display: true, text: 'ROAS (%)', font: { size: 10 } },
                            grid: { color: '#f1f5f9' }
                        }
                    },
                    plugins: {
                        legend: { labels: { font: { size: 11, family: 'Noto Sans KR' } } },
                        tooltip: { callbacks: { label: function(context) { return context.raw + '%'; } } }
                    }
                }
            });
        }

        // 이미지(PNG) 저장 기능 연동
        function downloadAllCharts() {
            if(!performanceChart || !roasChart) {
                alert('시각화된 차트 리포트가 비어있습니다. 다차원 엑셀 파일을 먼저 올려주세요!');
                return;
            }
            // 첫 번째 퍼포먼스 차트 자동 다운로드
            const link1 = document.createElement('a');
            link1.download = '캠페인별_기본성과_그래프.png';
            link1.href = performanceChart.toBase64Image();
            link1.click();

            // 조금의 텀을 두고 ROAS 차트 연달아 다운로드
            setTimeout(() => {
                const link2 = document.createElement('a');
                link2.download = '캠페인별_ROAS_분석_그래프.png';
                link2.href = roasChart.toBase64Image();
                link2.click();
            }, 300);
        }
    </script>
</body>
</html>
